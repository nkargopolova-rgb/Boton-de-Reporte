<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Actualizar Reporte Navixy</title>
<style>
body{font-family:Arial,sans-serif;text-align:center;margin-top:70px}
button,a{display:inline-block;background:#f5b800;color:#000;border:none;padding:15px 30px;font-size:18px;border-radius:8px;cursor:pointer;text-decoration:none;margin:8px}
button:disabled{opacity:.6;cursor:not-allowed}
#msg{margin-top:20px;font-size:18px}
#fecha{margin-top:10px;color:#555}
</style>
</head>
<body>

<h2>Reporte Nucleo</h2>

<button id="btn" onclick="actualizar()">🔄 Actualizar Reporte</button>
<a href="https://docs.google.com/spreadsheets/d/1Onudtp-J0RasDBBBBWOBl1OuVpKW9XeGlsXil20adE0/edit?gid=0#gid=0" target="_blank">📊 Abrir Reporte</a>

<div id="msg"></div>
<div id="fecha"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbycIfk2I_8g5FO7RKHuHH7N9GKuAPAViLaGDFR8o2v0UZLW3DxThvCC19lo03ZaWf0/exec";

function actualizar(){
  const btn = document.getElementById("btn");
  btn.disabled = true;
  document.getElementById("msg").innerHTML = "⏳ Actualizando reporte...";

  fetch(APPS_SCRIPT_URL)
    .then(r => r.text())
    .then(() => {
      document.getElementById("msg").innerHTML = "✅ Reporte actualizado correctamente";
      document.getElementById("fecha").innerHTML =
        "Última actualización: " + new Date().toLocaleString();
    })
    .catch(() => {
      document.getElementById("msg").innerHTML = "❌ Error al actualizar";
    })
    .finally(() => {
      btn.disabled = false;
    });
}
</script>

</body>
</html>
