    document.getElementById("msg").innerHTML =

    fetch("AQUI_VA_TU_URL_DE_APPS_SCRIPT")

        .then(data => {

        })
        .catch(err => {
            document.getElementById("msg").innerHTML =
                "❌ Error al actualizar";
        });
}

</script>
